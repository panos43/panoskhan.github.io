<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Khan AI SEO Brief Generator | Panos Khan</title>
  <meta name="description" content="Khan AI SEO Brief Generator demo for building deterministic, portfolio-ready SEO content briefs." />
  <style>
    :root{--bg:#070b14;--surface:#0f172a;--surface-2:#111c33;--text:#e6edf7;--muted:#9aa9c4;--line:#24324d;--neon:#00e5ff;--max:1080px;--radius:16px;}
    *{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:var(--neon);text-decoration:none}a:hover{text-decoration:underline}
    .container{max-width:var(--max);margin:0 auto;padding:0 20px}.section{padding:34px 0}
    .card{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 12px 34px rgba(0,0,0,.28)}
    .topbar{position:sticky;top:0;background:rgba(10,16,31,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(8px);z-index:10}
    .topbar-inner{max-width:var(--max);margin:0 auto;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .brand{font-weight:900}.brand span{color:var(--neon)}.nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav a,.btn{display:inline-block;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:#0d172c;color:#dff6ff;font-weight:700}
    .btn-primary{border-color:var(--neon);background:linear-gradient(90deg,#083642,#212c4e);box-shadow:0 0 18px rgba(0,229,255,.18)}
    .grid{display:grid;gap:14px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}@media (max-width:760px){.grid-2{grid-template-columns:1fr}}
    label{display:block;margin-bottom:6px;font-weight:600}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid #2a3b5d;background:#0b1428;color:#e8f0ff;outline:none}
    input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,229,255,.15)}
    .muted{color:var(--muted)}h1{font-size:clamp(1.6rem,3.2vw,2.4rem);margin:.2rem 0 .6rem}h2,h3{margin:0 0 10px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .report{display:none}.report.visible{display:block}
    .report section{border:1px solid var(--line);background:#0b1428;border-radius:12px;padding:14px;margin-bottom:12px}
    .report ul{margin:0;padding-left:18px}
    .result-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Panos <span>Khan</span> · AI Tool Demo</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/#tools">AI Tools</a>
        <a href="/tools/website-audit.html">Website Audit</a>
        <a href="/tools/ad-copy-studio.html">Ad Copy</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h1>Khan AI SEO Brief Generator</h1>
      <p class="muted">Client-side generator for portfolio demos. Outputs a practical SEO brief with deterministic structure and consultant framing.</p>
    </section>

    <section class="section">
      <div class="card">
        <h2>Brief Inputs</h2>
        <form id="briefForm">
          <div class="grid grid-2">
            <div>
              <label for="keyword">Primary keyword</label>
              <input id="keyword" name="keyword" type="text" required />
            </div>
            <div>
              <label for="audience">Audience</label>
              <input id="audience" name="audience" type="text" required />
            </div>
            <div>
              <label for="businessType">Business type</label>
              <input id="businessType" name="businessType" type="text" required />
            </div>
            <div>
              <label for="market">Location / market</label>
              <input id="market" name="market" type="text" required />
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Generate SEO Brief</button>
          </div>
        </form>
      </div>
    </section>

    <section id="report" class="section report">
      <div class="card">
        <div class="result-head">
          <h2 style="margin:0">SEO Brief Output</h2>
          <button id="copyBtn" class="btn" type="button">Copy Brief</button>
        </div>
        <div id="reportBody"></div>
      </div>
    </section>
  </main>

  <script>
    function esc(v){ return String(v).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch])); }
    function t(v){ return esc(String(v || '').trim().replace(/\s+/g, ' ')); }
    function cap(v){ return v ? v.charAt(0).toUpperCase() + v.slice(1) : v; }
    function ul(items){ return `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`; }

    function section(title, html){
      return `<section><h3>${title}</h3>${html}</section>`;
    }

    function buildBrief(data){
      const keyword = data.keyword;
      const kwCap = cap(keyword);
      return {
        titles: [
          `${kwCap} Guide for ${data.audience} in ${data.market}`,
          `How ${data.businessType} Teams Use ${keyword} to Improve Results`,
          `${kwCap}: Practical Strategy for ${data.market}`
        ],
        meta: `Discover a practical ${keyword} framework for ${data.audience}. Learn proven tactics, implementation steps, and performance tips for ${data.businessType} in ${data.market}.`,
        h1: `${kwCap} Strategy for ${data.audience}`,
        h2: [
          `Why ${keyword} matters in ${data.market}`,
          `${keyword} implementation framework for ${data.businessType}`,
          `Common mistakes to avoid with ${keyword}`,
          `Measurement plan and KPIs for ${keyword}`
        ],
        faqs: [
          `What is the fastest way to implement ${keyword} for ${data.businessType}?`,
          `How long does it take to see results from ${keyword}?`,
          `Which metrics should ${data.audience} track first?`,
          `How should teams in ${data.market} localize this strategy?`
        ],
        schema: ['Article', 'FAQPage', 'Organization', 'Service'],
        intent: `Primary intent: Commercial investigation. Searchers want a clear plan to evaluate and apply ${keyword}. Secondary intent: Informational, with interest in actionable steps and benchmarks for ${data.market}.`
      };
    }

    document.getElementById('briefForm').addEventListener('submit', function(e){
      e.preventDefault();
      const form = e.currentTarget;
      const data = {
        keyword: t(form.keyword.value),
        audience: t(form.audience.value),
        businessType: t(form.businessType.value),
        market: t(form.market.value)
      };
      const brief = buildBrief(data);

      const content = [
        section('Title Ideas', ul(brief.titles)),
        section('Meta Description', `<p>${brief.meta}</p>`),
        section('Recommended H1', `<p>${brief.h1}</p>`),
        section('H2 Outline', ul(brief.h2)),
        section('FAQ Ideas', ul(brief.faqs)),
        section('Schema Suggestions', ul(brief.schema)),
        section('Search Intent Summary', `<p>${brief.intent}</p>`)
      ].join('');

      document.getElementById('reportBody').innerHTML = content;
      document.getElementById('report').classList.add('visible');
      document.getElementById('report').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.getElementById('copyBtn').addEventListener('click', async function(){
      const text = document.getElementById('report').innerText.trim();
      try{
        await navigator.clipboard.writeText(text);
        this.textContent = 'Copied';
      } catch {
        this.textContent = 'Copy failed';
      }
      setTimeout(() => { this.textContent = 'Copy Brief'; }, 1500);
    });
  </script>
</body>
</html>
